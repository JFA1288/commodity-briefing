# ── Service lines ─────────────────────────────────────────────────────────────
# Key → display label used in Opportunity Radar and Account Intelligence.
service_lines:
  ma:               "Strategy & Transactions"
  capital_projects: "Capital Projects"
  cost_performance: "Cost & Performance"
  leadership:       "Leadership Advisory"
  regulation_risk:  "Risk Advisory"
  sustainability:   "Sustainability & Climate"
  digital_tech:     "Digital & Technology"
  cyber:            "Cyber Advisory"
  tax:              "Tax & Legal"
  supply_chain:     "Supply Chain"

# ── Demand-driver taxonomy ─────────────────────────────────────────────────────
# Each driver: keywords matched against headline+summary, materiality_weight
# (higher = more impactful mandate), service_line key, and suggested_angle
# (a templated one-liner shown as the "next step" on opportunity cards).
# Add/remove keywords here without touching code.
demand_drivers:
  ma:
    keywords:
      - acquisition
      - merger
      - takeover
      - "take-over"
      - buyout
      - "take private"
      - bid
      - divest
      - divestiture
      - divestment
      - stake
      - "asset sale"
      - IPO
      - listing
      - JV
      - "joint venture"
    materiality_weight: 3.0
    service_line: ma
    suggested_angle: "BD outreach — offer integration-readiness assessment or transaction due-diligence support"

  capital_projects:
    keywords:
      - FID
      - "final investment decision"
      - "new plant"
      - refinery
      - expansion
      - megaproject
      - capex
      - "capital expenditure"
      - greenfield
      - brownfield
      - "new terminal"
      - "new facility"
      - "capacity addition"
    materiality_weight: 2.5
    service_line: capital_projects
    suggested_angle: "Propose major-programme advisory or owner's-engineer support for capital delivery"

  cost_performance:
    keywords:
      - "profit warning"
      - "earnings miss"
      - impairment
      - write-down
      - writedown
      - "cost cutting"
      - restructuring
      - layoffs
      - "margin pressure"
      - "cost reduction"
      - "net loss"
      - "profit decline"
      - turnaround
    materiality_weight: 2.3
    service_line: cost_performance
    suggested_angle: "Offer performance-improvement or turnaround diagnostic"

  leadership:
    keywords:
      - "new CEO"
      - "new CFO"
      - "new COO"
      - appoints
      - "steps down"
      - resignation
      - succession
      - "management change"
      - "leadership change"
      - "new president"
      - "new MD"
      - "new managing director"
    materiality_weight: 2.0
    service_line: leadership
    suggested_angle: "Relationship trigger — schedule partner introduction or strategy conversation with new leadership"

  regulation_risk:
    keywords:
      - regulation
      - sanction
      - "export ban"
      - embargo
      - tariff
      - investigation
      - compliance
      - licence
      - license
      - permit
      - fine
      - penalty
      - CBAM
      - antitrust
      - lawsuit
      - court
    materiality_weight: 2.4
    service_line: regulation_risk
    suggested_angle: "Offer regulatory-response advisory or compliance-framework review"

  sustainability:
    keywords:
      - "net zero"
      - decarbonisation
      - decarbonization
      - emissions
      - carbon
      - CCS
      - CCUS
      - hydrogen
      - renewables
      - ESG
      - sustainability
      - "energy transition"
      - "climate risk"
      - "scope 3"
    materiality_weight: 2.0
    service_line: sustainability
    suggested_angle: "Engage on ESG reporting, transition roadmap, or carbon-accounting advisory"

  digital_tech:
    keywords:
      - "digital transformation"
      - automation
      - ERP
      - SAP
      - cloud
      - "data platform"
      - "trading platform"
      - TMS
      - "treasury management"
      - "finance transformation"
      - "system implementation"
      - "IT modernisation"
      - "IT modernization"
      - "AI implementation"
    materiality_weight: 2.8
    service_line: digital_tech
    suggested_angle: "Propose digital or technology-transformation advisory — strong team capability fit"

  cyber:
    keywords:
      - breach
      - ransomware
      - cyberattack
      - "IT outage"
      - "cyber incident"
      - hacked
      - "data breach"
      - "security incident"
    materiality_weight: 2.6
    service_line: cyber
    suggested_angle: "Offer cyber-resilience assessment or incident-response advisory"

  tax:
    keywords:
      - "transfer pricing"
      - "windfall tax"
      - "carbon tax"
      - "tax dispute"
      - "tax investigation"
      - "tax ruling"
      - "tax reform"
      - "excise duty"
    materiality_weight: 2.1
    service_line: tax
    suggested_angle: "Engage tax advisory team on transfer-pricing or tax-reform response"

  supply_chain:
    keywords:
      - "supply disruption"
      - "force majeure"
      - "logistics bottleneck"
      - "supply chain"
      - diversification
      - "sourcing strategy"
      - "supply shortage"
      - "shipping delay"
    materiality_weight: 2.0
    service_line: supply_chain
    suggested_angle: "Offer supply-chain resilience or procurement-optimisation advisory"

# ── Opportunity scoring weights ────────────────────────────────────────────────
# Final score = materiality_weight × recency_factor × source_weight × priority_multiplier
# All component values are stored per card for dashboard transparency.
opportunity_scoring:
  recency_halflife_hours: 18      # longer than news scoring — opportunities stay relevant longer
  priority_multipliers:
    high: 1.5
    med:  1.0
    low:  0.7
  max_opportunities: 12           # maximum cards shown in Opportunity Radar

# ── Legacy material-event keyword lists (used by consulting signal flags) ─────
scoring:
  recency_halflife_hours: 12
  source_weight_default: 1.0
  material_event_bonus: 2.5

material_event_keywords:
  earnings:         [earnings, profit, loss, revenue, EBITDA, "net income", quarterly, annual, results, EPS, dividend, guidance, outlook, forecast]
  ma:               [merger, acquisition, takeover, "take-over", buyout, "take private", bid, deal, stake, divest, divestment, JV, "joint venture", partnership]
  outage:           [outage, shutdown, "force majeure", disruption, offline, curtailment, maintenance, explosion, fire, accident, spill, leak]
  regulatory:       [sanction, ban, embargo, tariff, export, import, licence, license, permit, regulation, investigation, fine, penalty, court, lawsuit, antitrust]
  trading_moves:    [trader, "trading desk", hire, appoint, resign, restructure, layoff, headcount, "cost cut"]
  esg:              [ESG, decarbonization, "net zero", carbon, emissions, renewable, solar, wind, hydrogen, CCS, CCUS, sustainability]
  geopolitical:     [OPEC, OPEC+, Russia, Ukraine, Iran, China, "Red Sea", Strait, blockade, war, conflict, tension, sanctions]
  price_shock:      [surge, plunge, crash, spike, record, "all-time high", "all-time low", collapse, rally, soar]
  growth_strategy:  [expansion, "new market", greenfield, investment, "capacity addition", "new project", "strategic plan", "growth strategy", "market entry", "new terminal", "new plant"]
  trading_risk:     [hedge, hedging, derivatives, exposure, position, "margin call", counterparty, "mark-to-market", "risk limit", VaR, "stop-loss", "basis risk", "price risk", "market risk", volatility]
  enterprise_risk:  ["risk management", "enterprise risk", ERM, "internal controls", "internal audit", governance, "risk appetite", "risk register", "risk committee", "board risk", oversight, "control framework"]

