# ─────────────────────────────────────────────────────────────────────────────
# Commodity Briefing — Configuration
# Edit companies, commodities, feeds, and behavioural toggles here.
# No code changes needed for routine maintenance.
# ─────────────────────────────────────────────────────────────────────────────

# ── Summarizer ────────────────────────────────────────────────────────────────
# "heuristic" = fully rule-based, no external services (default, works in CI)
# "ollama"    = narrative summaries via a locally running Ollama instance
#               (only works on your own machine, NOT in GitHub Actions)
summarizer: heuristic

ollama:
  base_url: http://localhost:11434
  model: llama3.1

# ── News fetch settings ───────────────────────────────────────────────────────
news:
  lookback_hours: 36          # how far back to keep articles
  max_per_company: 10         # maximum headlines retained per company
  max_per_commodity: 6        # maximum headlines retained per commodity
  top_headlines_count: 15     # number of "top headlines" in digest
  request_timeout_s: 15       # HTTP timeout per request
  inter_request_delay_s: 1.2  # polite delay between RSS fetches
  feed_cache_ttl_min: 60      # re-use on-disk cache within this window

# ── Google News RSS region bias ───────────────────────────────────────────────
# Rotated across runs to broaden coverage.  Choices: SG, MY, ID, TH, AU
google_news_regions:
  - { gl: SG, ceid: "SG:en", hl: en-SG }
  - { gl: MY, ceid: "MY:en", hl: en-MY }
  - { gl: ID, ceid: "ID:en", hl: en-ID }
  - { gl: TH, ceid: "TH:en", hl: en-TH }

