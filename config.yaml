# ─────────────────────────────────────────────────────────────────────────────
# SEA Commodity Trading — Sector Intelligence
# Configuration — edit companies, drivers, scoring weights, and keyword sets
# here without touching any Python code.
# ─────────────────────────────────────────────────────────────────────────────

# ── Summarizer ────────────────────────────────────────────────────────────────
# mode: claude     → Anthropic Claude API (requires ANTHROPIC_API_KEY secret)
# mode: heuristic  → fully rule-based (default, works in CI, no API costs)
# mode: ollama     → local Ollama model (local runs only, not in CI)
summarizer:
  mode: claude
  model: claude-haiku-4-5-20251001   # verify current haiku model at docs.anthropic.com
  sonnet_model: claude-sonnet-4-6    # used for exec summary only (highest quality)
  max_tokens: 300
  cache_ttl_days: 3                  # LLM output cache lifetime in docs/data/llm_cache.json

ollama:
  base_url: http://localhost:11434
  model: llama3.1

# ── Dashboard identity ────────────────────────────────────────────────────────
dashboard:
  site_title: "Commodity Trading — Sector Intelligence"
  subtitle: "SEA Commodity Markets | Daily Intelligence"
  timezone_display: "SGT (UTC+8)"

# ── News fetch settings ───────────────────────────────────────────────────────
news:
  lookback_hours: 36
  max_per_company: 10
  max_per_commodity: 6
  top_headlines_count: 15
  request_timeout_s: 15
  inter_request_delay_s: 1.2
  feed_cache_ttl_min: 60

# ── Google News RSS region bias ───────────────────────────────────────────────
google_news_regions:
  - { gl: SG, ceid: "SG:en", hl: en-SG }
  - { gl: MY, ceid: "MY:en", hl: en-MY }
  - { gl: ID, ceid: "ID:en", hl: en-ID }
  - { gl: TH, ceid: "TH:en", hl: en-TH }

# ── EIA Open Data API (free — register at eia.gov) ───────────────────────────
# Set EIA_API_KEY env var or GitHub Actions secret. If absent, skips gracefully.
eia:
  enabled: true
  series:
    crude_inventory: "PET.WCRSTUS1.W"        # US crude oil inventories (weekly, Mbbl)
    natgas_storage:  "NG.NW2_EPG0_SWO_R48_BCF.W"  # US natgas storage (weekly, Bcf)
    crude_production: "PET.WCRFPUS2.W"       # US crude production (weekly, kbd)
    crude_imports:    "PET.WCRIMUS2.W"        # US crude imports (weekly, kbd)

# ── World Bank Commodity Markets / Pink Sheet ─────────────────────────────────
# Free monthly benchmark price data + published forecasts.
# Update the URL to the latest Pink Sheet CSV from:
# https://www.worldbank.org/en/research/commodity-markets
world_bank:
  pink_sheet_url: "https://thedocs.worldbank.org/en/doc/18675f1d1639c7a34d463f2e8f78b444-0050012024/related/CMO-Pink-Sheet-May-2024.xlsx"
  cache_days: 30

