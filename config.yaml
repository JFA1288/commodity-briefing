price_history_days: 90

# ── Independence & conflicts disclaimer ───────────────────────────────────────
# Shown in footer and Partner Weekly Brief on every run.
independence_disclaimer: >
  This tool aggregates public news for awareness purposes only.
  All pursuits are subject to client-acceptance, independence, and conflict checks
  in line with Deloitte policy. Confirm permissibility with Risk/Independence
  before any business development action on accounts marked audit_restricted.
