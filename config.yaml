# ─────────────────────────────────────────────────────────────────────────────
# Energy & Resources — Sector Intelligence
# Configuration for Deloitte E&R advisory team
# Edit companies, drivers, and scoring weights here; no code changes needed.
# ─────────────────────────────────────────────────────────────────────────────

# ── Summarizer ────────────────────────────────────────────────────────────────
# "heuristic" = fully rule-based (default, works in CI, no API costs)
# "ollama"    = narrative summaries via local Ollama (local only, not CI)
summarizer: heuristic

ollama:
  base_url: http://localhost:11434
  model: llama3.1

# ── Dashboard identity ────────────────────────────────────────────────────────
dashboard:
  site_title: "Energy & Resources — Sector Intelligence"
  subtitle: "Deloitte Advisory | SEA Commodity Markets"
  timezone_display: "SGT (UTC+8)"

# ── News fetch settings ───────────────────────────────────────────────────────
news:
  lookback_hours: 36
  max_per_company: 10
  max_per_commodity: 6
  top_headlines_count: 15
  request_timeout_s: 15
  inter_request_delay_s: 1.2
  feed_cache_ttl_min: 60

# ── Google News RSS region bias ───────────────────────────────────────────────
google_news_regions:
  - { gl: SG, ceid: "SG:en", hl: en-SG }
  - { gl: MY, ceid: "MY:en", hl: en-MY }
  - { gl: ID, ceid: "ID:en", hl: en-ID }
  - { gl: TH, ceid: "TH:en", hl: en-TH }

# ── Companies ─────────────────────────────────────────────────────────────────
# sector:       energy | metals_mining | power_utilities | trading
# relationship: client | target | audit_restricted
#               audit_restricted → BD next steps suppressed; independence notice shown
# priority:     high | med | low  (multiplies opportunity score)
# ticker:       listed ticker for reference (blank if private)
# one_liner:    brief description shown in Account Intelligence
companies:
  - name: Shell
    aliases: [Shell, "Shell plc", "Royal Dutch Shell"]
    country: NL
    sector: energy
    relationship: target
    priority: high
    ticker: SHEL.L
    one_liner: "Global supermajor; major LNG trader and downstream operator across Asia-Pacific."
    # Search targets Shell's Singapore trading arm (Shell Eastern Trading, Shell Energy Trading)
    search_query: '"Shell Eastern Trading" OR "Shell Energy Trading" OR "Shell Trading" Singapore'

  - name: ExxonMobil
    aliases: [ExxonMobil, Exxon, "Exxon Mobil"]
    country: US
    sector: energy
    relationship: target
    priority: med
    ticker: XOM
    one_liner: "US supermajor with significant upstream and chemicals exposure across SEA."
    # ExxonMobil's Asia-Pacific trading and marketing hub is in Singapore
    search_query: '"ExxonMobil" Singapore trading OR "ExxonMobil Asia Pacific" OR "Esso" Singapore trading'

  - name: Chevron
    aliases: [Chevron, "Chevron Corporation"]
    country: US
    sector: energy
    relationship: target
    priority: med
    ticker: CVX
    one_liner: "US supermajor; upstream production in Australia, Indonesia, and Thailand."
    # Chevron Products Company is the Singapore-based trading/marketing entity
    search_query: '"Chevron" Singapore trading OR "Chevron Products" Singapore OR "Chevron Asia" trading'

  - name: TotalEnergies Trading Asia
    aliases: [TotalEnergies, "Total Energies", "TotalEnergies Trading Asia"]
    country: FR
    sector: trading
    relationship: target
    priority: high
    ticker: TTE.PA
    one_liner: "Trading arm of TotalEnergies; significant LNG and crude trading hub in Singapore."
    search_query: '"TotalEnergies Trading Asia" OR "TotalEnergies" Singapore LNG trading OR "Total Gas & Power Asia"'

  - name: Aramco Trading Singapore
    aliases: ["Aramco Trading", "Saudi Aramco", "Aramco Trading Singapore"]
    country: SA
    sector: trading
    relationship: target
    priority: high
    ticker: ""
    one_liner: "Trading subsidiary of Saudi Aramco; crude and products marketing across Asia."
    search_query: '"Aramco Trading" Singapore OR "Aramco Trading Singapore" OR "Saudi Aramco" Asia trading'

  - name: Anglo American
    aliases: ["Anglo American", "Anglo American plc"]
    country: GB
    sector: metals_mining
    relationship: target
    priority: med
    ticker: AAL.L
    one_liner: "Diversified global miner; platinum, copper, iron ore, and steelmaking coal."
    # Anglo American Marketing Ltd is the Singapore-based trading entity
    search_query: '"Anglo American" Singapore trading OR "Anglo American Marketing" OR "Anglo American" commodity trading Asia'

  - name: Rio Tinto
    aliases: ["Rio Tinto", "Rio Tinto Group"]
    country: GB
    sector: metals_mining
    relationship: target
    priority: high
    ticker: RIO.L
    one_liner: "Global miner; iron ore, copper, aluminium, and battery-materials strategy."
    # Rio Tinto's commercial/trading operations are run out of Singapore
    search_query: '"Rio Tinto" Singapore trading OR "Rio Tinto Commercial" OR "Rio Tinto" commodity marketing Asia'

  - name: BHP
    aliases: [BHP, "BHP Group", "BHP Billiton"]
    country: AU
    sector: metals_mining
    relationship: target
    priority: high
    ticker: BHP.AX
    one_liner: "Diversified global miner; iron ore, copper, coal, and nickel operations."
    # BHP's marketing arm trades out of Singapore
    search_query: '"BHP" Singapore trading OR "BHP Marketing" OR "BHP" commodity marketing Asia'

  - name: Woodside Energy
    aliases: ["Woodside Energy", "Woodside Petroleum", Woodside]
    country: AU
    sector: energy
    relationship: target
    priority: med
    ticker: WDS.AX
    one_liner: "Australian LNG producer; Pluto, North West Shelf, and emerging hydrogen assets."
    # Woodside Marketing Singapore handles LNG offtake and trading
    search_query: '"Woodside" Singapore LNG OR "Woodside Marketing" OR "Woodside Energy" Asia trading'

  - name: PETRONAS
    aliases: [PETRONAS, "Petronas", "Petronas Trading", PFLB]
    country: MY
    sector: energy
    relationship: client
    priority: high
    ticker: ""
    one_liner: "Malaysian national oil company; major LNG exporter, upstream, and trading arm."
    # PTLSB (Petronas LNG Trading Sdn Bhd) and Petronas Trading are the commercial arms
    search_query: '"PETRONAS" trading OR "PTLSB" OR "Petronas LNG" trading OR "Petronas Energy Trading"'

  - name: Tenaga Nasional Berhad
    aliases: [TNB, "Tenaga Nasional", "Tenaga Nasional Berhad"]
    country: MY
    sector: power_utilities
    relationship: target
    priority: med
    ticker: TENAGA.KL
    one_liner: "Malaysia's national electricity utility; generation, transmission, and distribution."
    # TNB Fuel Services and TNB Energy Trading handle fuel procurement and power trading
    search_query: '"TNB" fuel procurement OR "TNB Energy Trading" OR "Tenaga Nasional" energy trading OR "TNB Fuel"'

  - name: PTT
    aliases: [PTT, "PTT Public", "PTT Thailand", "PTT Group"]
    country: TH
    sector: energy
    relationship: target
    priority: high
    ticker: PTT.BK
    one_liner: "Thai national oil and gas company; upstream, downstream, LNG, and petrochemicals."
    # PTT International Trading (PTTT) is based in Singapore
    search_query: '"PTT International Trading" OR "PTTT" Singapore OR "PTT" Singapore LNG trading OR "PTT" commodity trading'

  - name: Pertamina
    aliases: [Pertamina, "PT Pertamina"]
    country: ID
    sector: energy
    relationship: target
    priority: high
    ticker: ""
    one_liner: "Indonesian national oil company; refining, upstream, and trading operations."
    # Pertamina International Shipping and Pertamina Energy Trading operate in Singapore
    search_query: '"Pertamina International" Singapore OR "Pertamina Energy Trading" OR "Pertamina" Singapore trading OR "PT Pertamina" trading'

  - name: MIND ID
    aliases: ["MIND ID", ANTAM, "Aneka Tambang", "Bukit Asam", PTBA, Timah]
    country: ID
    sector: metals_mining
    relationship: target
    priority: med
    ticker: ""
    one_liner: "Indonesian state mining holding company; nickel, coal, aluminium, tin, and gold."
    # MIND ID group companies trade minerals and coal out of Singapore
    search_query: '"MIND ID" Singapore OR "ANTAM" trading OR "Bukit Asam" coal trading OR "MIND ID" commodity'

  - name: EGAT
    aliases: [EGAT, "Electricity Generating Authority of Thailand"]
    country: TH
    sector: power_utilities
    relationship: target
    priority: low
    ticker: ""
    one_liner: "Thailand's state electricity authority; power generation, grid, and renewable projects."
    # EGAT International Co. Ltd. handles cross-border power trading and fuel procurement
    search_query: '"EGAT International" OR "EGAT" Singapore OR "EGAT" LNG procurement OR "EGAT" power trading'

  - name: Cargill Asia
    aliases: [Cargill, "Cargill Asia", "Cargill Singapore"]
    country: US
    sector: trading
    relationship: target
    priority: med
    ticker: ""
    one_liner: "Global agri-commodity trading and processing giant; large Asia-Pacific presence."
    search_query: '"Cargill" Singapore trading OR "Cargill Asia" OR "Cargill" Asia commodity OR "Cargill" grains trading'

  - name: Mercuria
    aliases: [Mercuria, "Mercuria Energy"]
    country: CH
    sector: trading
    relationship: target
    priority: high
    ticker: ""
    one_liner: "Swiss-origin independent commodity trading house; energy and metals trading globally."
    search_query: '"Mercuria" Singapore OR "Mercuria Energy" trading OR "Mercuria" Asia commodity'

  - name: Danantara
    aliases: [Danantara, "Danantara Indonesia", "BPI Danantara"]
    country: ID
    sector: trading
    relationship: target
    priority: high
    ticker: ""
    one_liner: "Indonesia's sovereign wealth and state-asset management vehicle, managing c.$900bn."
    search_query: '"Danantara" Indonesia OR "BPI Danantara" OR "Danantara" investment trading'

