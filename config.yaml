# ── Market themes (seeded; new themes added dynamically when cluster ≥ min_items) ──
themes:
  - name: "Energy Transition & Decarbonisation"
    driver_tags: [energy_transition]
    min_items: 2
    description: "Policies, investments, and corporate actions driving the low-carbon shift"

  - name: "Digital & AI in Trading / Treasury"
    driver_tags: [digital_tech_driver]
    min_items: 2
    description: "Technology transformation in trading operations, finance, and back-office"

  - name: "Supply Diversification & Resilience"
    driver_tags: [mine_disruption, supply_side]
    min_items: 2
    description: "Supply disruptions, diversification strategies, and resilience investments"

  - name: "China Demand & Industrial Activity"
    driver_tags: [china_demand]
    min_items: 2
    description: "Chinese economic signals and their commodity demand implications"

  - name: "Indonesia Policy & Downstreaming"
    driver_tags: [regulatory_driver]
    keywords: [Indonesia, Indonesian, downstreaming, "nickel export", "MIND ID", Pertamina, "hilirisasi"]
    min_items: 2
    description: "Indonesian downstream industrialisation policy and resource nationalism"

# ── Standing risks (always included in Risks & Events section) ────────────────
standing_risks:
  - direction: downside
    text: "OPEC+ accelerated output unwind adding supply and weighing on crude prices"
  - direction: downside
    text: "China industrial slowdown and property-sector weakness dampening metals demand"
  - direction: upside
    text: "Middle East escalation risk disrupting Strait of Hormuz shipping lanes"
  - direction: upside
    text: "Weather events (El Niño / La Niña) reducing hydro power and agricultural yields"
  - direction: downside
    text: "USD strength pressuring USD-denominated commodity prices across all asset classes"

# ── Events calendar ───────────────────────────────────────────────────────────
