# ── Commodities ───────────────────────────────────────────────────────────────
# Only tickers confirmed to return live data via yfinance (Yahoo Finance).
commodities:
  # Crude oil
  - id: brent
    display: "Brent Crude"
    unit: "USD/bbl"
    group: crude_oil
    yfinance_ticker: "BZ=F"

  - id: wti
    display: "WTI Crude"
    unit: "USD/bbl"
    group: crude_oil
    yfinance_ticker: "CL=F"

  # Natural gas
  - id: henry_hub
    display: "Henry Hub Gas"
    unit: "USD/MMBtu"
    group: natgas_lng
    yfinance_ticker: "NG=F"

  # Metals
  - id: copper
    display: "Copper (COMEX)"
    unit: "USD/t"
    group: base_metals
    yfinance_ticker: "HG=F"
    yfinance_unit_multiplier: 2204.62   # HG=F is USD/lb → USD/t

  # Agri (Cargill context)
  - id: soybeans
    display: "Soybeans (CBOT)"
    unit: "USc/bu"
    group: agri
    yfinance_ticker: "ZS=F"

  - id: wheat
    display: "Wheat (CBOT)"
    unit: "USc/bu"
    group: agri
    yfinance_ticker: "ZW=F"

# ── Supplementary RSS feeds ───────────────────────────────────────────────────
# These are fetched in addition to the per-company Google News searches.
supplementary_feeds:
  - name: Reuters Commodities
    url: "https://feeds.reuters.com/reuters/businessNews"
    weight: 1.8

  - name: OilPrice.com
    url: "https://oilprice.com/rss/main"
    weight: 1.3

  - name: Rigzone News
    url: "https://www.rigzone.com/news/rss/rigzone_latest.aspx"
    weight: 1.2

  - name: Mining.com
    url: "https://www.mining.com/feed/"
    weight: 1.2

  - name: Hellenic Shipping News
    url: "https://www.hellenicshippingnews.com/feed/"
    weight: 1.0

  - name: The Edge Malaysia
    url: "https://www.theedgemarkets.com/rss.xml"
    weight: 1.1

  - name: Business Times SG
    url: "https://www.businesstimes.com.sg/rss/all"
    weight: 1.1

  - name: Jakarta Post Business
    url: "https://www.thejakartapost.com/feed/category/business"
    weight: 1.0

  - name: Bangkok Post Business
    url: "https://www.bangkokpost.com/rss/data/business.xml"
    weight: 1.0

  - name: S&P Global Commodity
    url: "https://www.spglobal.com/commodityinsights/en/rss-feed/oil"
    weight: 1.5

# ── Scoring & ranking ─────────────────────────────────────────────────────────
scoring:
  recency_halflife_hours: 12      # score halves every N hours
  source_weight_default: 1.0
  material_event_bonus: 2.5       # added to score if a material-event keyword fires

# ── Material-event keyword lists ──────────────────────────────────────────────
material_event_keywords:
  earnings:       [earnings, profit, loss, revenue, EBITDA, "net income", quarterly, annual, results, EPS, dividend, guidance, outlook, forecast]
  ma:             [merger, acquisition, takeover, "take-over", buyout, "take private", bid, deal, stake, divest, divestment, JV, "joint venture", partnership]
  outage:         [outage, shutdown, "force majeure", disruption, offline, curtailment, maintenance, explosion, fire, accident, spill, leak]
  regulatory:     [sanction, ban, embargo, tariff, export, import, licence, license, permit, regulation, investigation, fine, penalty, court, lawsuit, antitrust]
  trading_moves:  [trader, "trading desk", hire, appoint, resign, restructure, layoff, headcount, "cost cut"]
  esg:            [ESG, decarbonization, "net zero", carbon, emissions, renewable, solar, wind, hydrogen, CCS, CCUS, sustainability]
  geopolitical:   [OPEC, OPEC+, Russia, Ukraine, Iran, China, "Red Sea", Strait, blockade, war, conflict, tension, sanctions]
  price_shock:    [surge, plunge, crash, spike, record, "all-time high", "all-time low", collapse, rally, soar]

# ── "What to watch" macro context terms ───────────────────────────────────────
macro_watch_terms:
  - "USD strength"
  - "China demand"
  - "OPEC+ production"
  - "Fed rate"
  - "USD/MYR"
  - "USD/IDR"
  - "USD/THB"
  - "weather El Niño"
  - "monsoon season"

# ── Price history cap ─────────────────────────────────────────────────────────
price_history_days: 90

# ── Dashboard ─────────────────────────────────────────────────────────────────
dashboard:
  site_title: "SEA Commodity Briefing"
  timezone_display: "SGT (UTC+8)"
