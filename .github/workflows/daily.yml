name: Daily Commodity Intelligence

on:
  schedule:
    # 23:00 UTC = 07:00 Singapore (SGT, UTC+8). Adjust as needed.
    - cron: "0 23 * * *"
  workflow_dispatch:   # manual "Run workflow" button; also a fallback if GitHub
                       # disables the schedule after ~60 days of repo inactivity

permissions:
  contents: write      # needed to commit regenerated docs/ back to the repo

concurrency:
  group: daily-digest
  cancel-in-progress: false   # let a running job finish; don't cancel it

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}    # free key — register at eia.gov
        run: python -m src.main

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily commodity intelligence $(date -u +'%Y-%m-%d')"
            # Pull with rebase; -X theirs resolves any conflicts by keeping our
            # freshly generated docs/ output rather than the stale remote version.
            git pull --rebase -X theirs origin main
            git push
          fi
