name: Daily Commodity Digest

on:
  schedule:
    # 23:00 UTC ≈ 07:00 Singapore (SGT, UTC+8). Adjust as needed.
    - cron: "0 23 * * *"
  workflow_dispatch:        # manual "Run workflow" button (and a backup if
                            # GitHub disables the schedule after ~60d inactivity)

# Allow the workflow to commit the regenerated docs/ back to the repo.
permissions:
  contents: write

# Don't let two runs overlap (e.g. a manual run during the scheduled one).
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so the commit/push is clean

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the agent
        run: python -m src.main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if something actually changed.
          if git diff --staged --quiet; then
            echo "No changes to publish today."
          else
            git commit -m "chore: daily commodity digest $(date -u +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
